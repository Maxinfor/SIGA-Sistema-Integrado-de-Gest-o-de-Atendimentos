<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGA - Pesquisa</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>


<div class="layout">



<aside class="sidebar">


<div class="logo">

<h2>SIGA</h2>

<span>
Gestão de Atendimentos
</span>

</div>




<nav>


<a href="index.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>



<a href="cadastro.html">

<i class="fa-solid fa-file-circle-plus"></i>

Cadastro

</a>




<a class="ativo" href="pesquisa.html">

<i class="fa-solid fa-magnifying-glass"></i>

Pesquisa

</a>




<a>

<i class="fa-solid fa-chart-column"></i>

Relatórios

</a>




<a>

<i class="fa-solid fa-gear"></i>

Configurações

</a>



</nav>





<div class="usuario">

<i class="fa-solid fa-user"></i>

Administrador

</div>



</aside>










<main class="conteudo">


<header>

<h1>

Pesquisa de Atendimentos

</h1>


</header>









<section class="painel">


<h3>

Filtros

</h3>



<div class="form-grid">





<div>

<label>

Nome

</label>


<input id="fNome"
onkeyup="pesquisar()">


</div>






<div>

<label>

Responsável

</label>


<input id="fResponsavel"
onkeyup="pesquisar()">


</div>






<div>

<label>

Localidade

</label>


<input id="fLocalidade"
onkeyup="pesquisar()">


</div>







<div>

<label>

Tipo Atendimento

</label>


<select id="fTipo"
onchange="pesquisar()">


<option value="">
Todos
</option>


<option>
Atendimento presencial
</option>


<option>
Atendimento telefônico
</option>


<option>
Atendimento On-line
</option>


<option>
Outro
</option>



</select>


</div>








<div>

<label>

Assunto

</label>


<select id="fAssunto"
onchange="pesquisar()">


<option value="">
Todos
</option>


<option>
Vaga escolar
</option>


<option>
Abandono de incapaz
</option>


<option>
Conflito familiar
</option>


<option>
Outro
</option>



</select>


</div>





</div>


</section>









<section class="painel">


<h3>

Resultado

</h3>



<table>


<thead>


<tr>


<th>
Data
</th>


<th>
Nome
</th>


<th>
Responsável
</th>


<th>
Assunto
</th>


<th>
Tipo
</th>


<th>
Ações
</th>


</tr>


</thead>



<tbody id="resultado">


</tbody>



</table>



</section>







</main>



</div>






<script src="js/pesquisa.js"></script>


</body>


</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGA - Cadastro</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>


<div class="layout">



<aside class="sidebar">


<div class="logo">

<h2>SIGA</h2>

<span>
Gestão de Atendimentos
</span>

</div>



<nav>


<a href="index.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>



<a class="ativo" href="cadastro.html">

<i class="fa-solid fa-file-circle-plus"></i>

Cadastro

</a>




<a href="pesquisa.html">

<i class="fa-solid fa-magnifying-glass"></i>

Pesquisa

</a>




<a href="#">

<i class="fa-solid fa-chart-column"></i>

Relatórios

</a>




<a href="#">

<i class="fa-solid fa-gear"></i>

Configurações

</a>



</nav>





<div class="usuario">

<i class="fa-solid fa-user"></i>

Administrador

</div>



</aside>









<main class="conteudo">


<header>

<h1>

Novo Atendimento

</h1>


</header>









<section class="painel">


<h3>
Dados da Criança/Adolescente
</h3>




<div class="form-grid">



<div>
<label>
Data
</label>

<input id="data" type="date">

</div>





<div>
<label>
Nome
</label>

<input id="nome" type="text">

</div>






<div>
<label>
Data de nascimento
</label>

<input id="nascimento" type="date">

</div>






<div>
<label>
Responsável
</label>

<input id="responsavel" type="text">

</div>



</div>



</section>









<section class="painel">


<h3>
Endereço e Contatos
</h3>




<div class="form-grid">



<div>
<label>
Endereço
</label>

<input id="endereco">

</div>





<div>
<label>
Localidade
</label>

<input id="localidade">

</div>






<div>
<label>
Contato
</label>

<input id="contato">

</div>






<div>
<label>
Contato 2
</label>

<input id="contato2">

</div>




</div>


</section>









<section class="painel">


<h3>
Informações do Atendimento
</h3>



<div class="form-grid">



<div>

<label>
Tipo de Atendimento
</label>


<select id="tipo">


<option value="">
Selecione
</option>


<option>
Atendimento presencial
</option>


<option>
Atendimento telefônico
</option>


<option>
Atendimento On-line
</option>


<option>
Outro
</option>


</select>


</div>







<div>

<label>
Assunto
</label>


<select id="assunto">


<option value="">
Selecione
</option>


<option>
Vaga escolar
</option>


<option>
Abandono de incapaz
</option>


<option>
Conflito familiar
</option>


<option>
Outro
</option>


</select>


</div>







<div>

<label>
Plantonista
</label>


<input id="plantonista">


</div>






<div>

<label>
Usuário
</label>


<input id="usuario" value="Administrador">


</div>



</div>






<label>

Observações

</label>


<textarea id="observacoes"></textarea>






<br>


<button onclick="salvarAtendimento()">

<i class="fa-solid fa-floppy-disk"></i>

Salvar Atendimento

</button>





</section>







</main>


</div>






<script src="js/cadastro.js"></script>


</body>

</html>

<!-- ==========================================================
    VEÍCULOS - SIGACTPAR
=========================================================== -->

<div class="pagina">

    <!-- CABEÇALHO DA PÁGINA & AÇÕES -->
    <div class="titulo-pagina">
        <div>
            <h2>Controle de Veículos</h2>
            <small>Gestão da frota oficial e controle de saídas para diligências.</small>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button id="btnAtualizarVeiculos" class="btn-padrao" style="background: var(--cor-fundo); color: var(--texto); border: 1px solid var(--borda);">
                <i class="fa-solid fa-rotate"></i> Atualizar
            </button>
            <button id="btnNovoVeiculo" class="btn-padrao">
                <i class="fa-solid fa-plus"></i> Novo Veículo
            </button>
        </div>
    </div>

    <!-- CARDS / INDICADORES -->
    <div class="dashboard-cards">
        <div class="card azul">
            <div class="card-icone"><i class="fa-solid fa-car-side"></i></div>
            <div class="card-info">
                <span>Total de Veículos</span>
                <h3 id="cardTotalVeiculos">0</h3>
                <small>Frota cadastrada</small>
            </div>
        </div>

        <div class="card verde">
            <div class="card-icone"><i class="fa-solid fa-circle-check"></i></div>
            <div class="card-info">
                <span>Disponíveis</span>
                <h3 id="cardVeiculosDisponiveis">0</h3>
                <small>Prontos para diligência</small>
            </div>
        </div>
    </div>

    <!-- PAINEL DE PESQUISA -->
    <div class="painel">
        <div class="grupo-campo" style="margin-bottom: 0;">
            <label for="pesquisaVeiculo">Pesquisar Veículo</label>
            <input type="text" id="pesquisaVeiculo" placeholder="Modelo, placa ou motorista responsável...">
        </div>
    </div>

    <!-- TABELA DE REGISTROS -->
    <div class="painel">
        <div class="painel-header" style="margin-bottom: 15px;">
            <h3><i class="fa-solid fa-list"></i> Frota Oficial</h3>
        </div>

        <div class="tabela-container">
            <table class="tabela-dashboard">
                <thead>
                    <tr>
                        <th>Placa</th>
                        <th>Modelo / Veículo</th>
                        <th>Ano</th>
                        <th>Status</th>
                        <th>Motorista Resp.</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaVeiculos">
                    <!-- Preenchido via veiculos.js -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- MODAL DE CADASTRO / EDIÇÃO DE VEÍCULOS -->
<div id="modalVeiculo" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Formulário de Veículo</h2>
            <button id="fecharModalVeiculo" class="fechar"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <form id="formVeiculo">
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="placaVeiculo">Placa <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="placaVeiculo" placeholder="Ex: ABC-1D23" required>
                    </div>

                    <div class="form-group">
                        <label for="modeloVeiculo">Modelo / Marca <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="modeloVeiculo" placeholder="Ex: Fiat Argo Oficial" required>
                    </div>

                    <div class="form-group">
                        <label for="anoVeiculo">Ano</label>
                        <input type="text" id="anoVeiculo" placeholder="Ex: 2024">
                    </div>

                    <div class="form-group">
                        <label for="statusVeiculo">Status <span style="color:var(--vermelho);">*</span></label>
                        <select id="statusVeiculo" required>
                            <option value="Disponível">Disponível</option>
                            <option value="Em Diligência">Em Diligência</option>
                            <option value="Em Manutenção">Em Manutenção</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label for="motoristaVeiculo">Motorista / Responsável</label>
                        <input type="text" id="motoristaVeiculo" placeholder="Nome do conselheiro responsável pelo veículo">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" id="cancelarVeiculo" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-salvar"><i class="fa-solid fa-floppy-disk"></i> Salvar Veículo</button>
            </div>
        </form>
    </div>
</div>

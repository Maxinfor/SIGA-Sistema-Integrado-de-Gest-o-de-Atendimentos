<!-- ==========================================================
    AGENDA - SIGACTPAR
=========================================================== -->

<div class="pagina">

    <!-- CABEÇALHO DA PÁGINA & AÇÕES -->
    <div class="titulo-pagina">
        <div>
            <h2>Agenda de Compromissos</h2>
            <small>Controle de diligências, reuniões e audiências do Conselho Tutelar.</small>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button id="btnAtualizarAgenda" class="btn-padrao" style="background: var(--cor-fundo); color: var(--texto); border: 1px solid var(--borda);">
                <i class="fa-solid fa-rotate"></i> Atualizar
            </button>
            <button id="btnNovoCompromisso" class="btn-padrao">
                <i class="fa-solid fa-plus"></i> Novo Compromisso
            </button>
        </div>
    </div>

    <!-- CARDS / INDICADORES -->
    <div class="dashboard-cards">
        <div class="card azul">
            <div class="card-icone"><i class="fa-solid fa-calendar-days"></i></div>
            <div class="card-info">
                <span>Total Agendados</span>
                <h3 id="cardTotalAgenda">0</h3>
                <small>Compromissos cadastrados</small>
            </div>
        </div>

        <div class="card verde">
            <div class="card-icone"><i class="fa-solid fa-clock"></i></div>
            <div class="card-info">
                <span>Próximos Dias</span>
                <h3 id="cardAgendaProximos">0</h3>
                <small>Na agenda</small>
            </div>
        </div>
    </div>

    <!-- PAINEL DE PESQUISA -->
    <div class="painel">
        <div class="grupo-campo" style="margin-bottom: 0;">
            <label for="pesquisaAgenda">Pesquisar na Agenda</label>
            <input type="text" id="pesquisaAgenda" placeholder="Título do compromisso ou local...">
        </div>
    </div>

    <!-- TABELA DE REGISTROS -->
    <div class="painel">
        <div class="painel-header" style="margin-bottom: 15px;">
            <h3><i class="fa-solid fa-list"></i> Compromissos Agendados</h3>
        </div>

        <div class="tabela-container">
            <table class="tabela-dashboard">
                <thead>
                    <tr>
                        <th>Data / Hora</th>
                        <th>Compromisso</th>
                        <th>Local</th>
                        <th>Responsável</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaAgenda">
                    <!-- Preenchido via agenda.js -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- ==========================================================
    MODAL DE CADASTRO / EDIÇÃO DE COMPROMISSO
=========================================================== -->
<div id="modalAgenda" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Novo Compromisso / Diligência</h2>
            <button id="fecharModalAgenda" class="fechar"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <form id="formAgenda">
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group full">
                        <label for="tituloAgenda">Título do Compromisso <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="tituloAgenda" placeholder="Ex: Diligência Escolar / Reunião com CREAS" required>
                    </div>

                    <div class="form-group">
                        <label for="dataAgenda">Data e Hora <span style="color:var(--vermelho);">*</span></label>
                        <input type="datetime-local" id="dataAgenda" required>
                    </div>

                    <div class="form-group">
                        <label for="localAgenda">Local <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="localAgenda" placeholder="Ex: Escola Classe 01 do Paranoá" required>
                    </div>

                    <div class="form-group full">
                        <label for="responsavelAgenda">Conselheiro(a) Responsável</label>
                        <input type="text" id="responsavelAgenda" placeholder="Nome do conselheiro plantonista ou comissão">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" id="cancelarAgenda" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-salvar"><i class="fa-solid fa-floppy-disk"></i> Salvar Compromisso</button>
            </div>
        </form>
    </div>
</div>

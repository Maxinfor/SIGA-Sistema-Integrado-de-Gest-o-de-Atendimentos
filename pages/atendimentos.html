<section class="pagina">

    <!-- ==========================================================
            CABEÇALHO
    =========================================================== -->

    <div class="titulo-pagina">

        <h2>Atendimentos</h2>

        <button class="btn-padrao" id="btnNovo">

            <i class="fa-solid fa-plus"></i>

            Novo Atendimento

        </button>

    </div>

    <!-- ==========================================================
            PESQUISA E FILTROS
    =========================================================== -->

    <div class="barra-filtros">

        <input
            type="text"
            id="pesquisa"
            placeholder="Pesquisar atendimento...">

        <select id="filtroStatus">

            <option value="">Todos os Status</option>
            <option>Em Atendimento</option>
            <option>Concluído</option>
            <option>Encaminhado</option>
            <option>Pendente</option>

        </select>

    </div>

    <!-- ==========================================================
            TABELA
    =========================================================== -->

    <div class="painel">

        <table class="tabela-dashboard">

            <thead>

                <tr>

                    <th>Nº</th>

                    <th>Data</th>

                    <th>Criança / Adolescente</th>

                    <th>Responsável</th>

                    <th>Status</th>

                    <th width="150">Ações</th>

                </tr>

            </thead>

            <tbody id="listaAtendimentos">

                <tr>

                    <td colspan="6">

                        Nenhum atendimento cadastrado.

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</section>

<!-- ==========================================================
        MODAL CADASTRO
========================================================== -->

<div class="modal" id="modalAtendimento">

    <div class="modal-box">

        <div class="modal-header">

            <h2>

                <i class="fa-solid fa-file-circle-plus"></i>

                Novo Atendimento

            </h2>

            <button class="fechar" id="fecharModal">

                ×

            </button>

        </div>

        <div class="modal-body">

            <form id="formAtendimento">

                <div class="form-grid">

                    <div class="form-group">

                        <label>Data</label>

                        <input
                            type="date"
                            id="data"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Hora</label>

                        <input
                            type="time"
                            id="hora"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Criança / Adolescente</label>

                        <input
                            type="text"
                            id="crianca"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Responsável</label>

                        <input
                            type="text"
                            id="responsavel"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Telefone</label>

                        <input
                            type="text"
                            id="telefone">

                    </div>

                    <div class="form-group">

                        <label>Status</label>

                        <select id="status">

                            <option>Em Atendimento</option>
                            <option>Concluído</option>
                            <option>Encaminhado</option>
                            <option>Pendente</option>

                        </select>

                    </div>

                    <div class="form-group full">

                        <label>Relato</label>

                        <textarea
                            id="relato"
                            placeholder="Descreva o atendimento..."
                            required></textarea>

                    </div>

                </div>

            </form>

        </div>

        <div class="modal-footer">

            <button
                class="btn-cancelar"
                id="cancelar">

                Cancelar

            </button>

            <button
                class="btn-salvar"
                form="formAtendimento">

                Salvar Atendimento

            </button>

        </div>

    </div>

</div>

<!-- ==========================================================
        MODAL VISUALIZAR
========================================================== -->

<div class="modal" id="modalVisualizar">

    <div class="modal-box">

        <div class="modal-header">

            <h2>

                <i class="fa-solid fa-eye"></i>

                Detalhes do Atendimento

            </h2>

            <button
                class="fechar"
                id="fecharVisualizar">

                ×

            </button>

        </div>

        <div class="modal-body">

            <div class="form-grid">

                <div class="form-group">

                    <label>Data</label>

                    <input
                        type="text"
                        id="verData"
                        readonly>

                </div>

                <div class="form-group">

                    <label>Hora</label>

                    <input
                        type="text"
                        id="verHora"
                        readonly>

                </div>

                <div class="form-group">

                    <label>Criança / Adolescente</label>

                    <input
                        type="text"
                        id="verCrianca"
                        readonly>

                </div>

                <div class="form-group">

                    <label>Responsável</label>

                    <input
                        type="text"
                        id="verResponsavel"
                        readonly>

                </div>

                <div class="form-group">

                    <label>Telefone</label>

                    <input
                        type="text"
                        id="verTelefone"
                        readonly>

                </div>

                <div class="form-group">

                    <label>Status</label>

                    <input
                        type="text"
                        id="verStatus"
                        readonly>

                </div>

                <div class="form-group full">

                    <label>Relato</label>

                    <textarea
                        id="verRelato"
                        readonly></textarea>

                </div>

            </div>

        </div>

    </div>

</div>

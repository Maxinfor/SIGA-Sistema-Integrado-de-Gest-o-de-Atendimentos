<section class="pagina">

    <div class="titulo-pagina">

        <h2>Atendimentos</h2>

        <button class="btn-padrao" id="btnNovo">

            <i class="fa-solid fa-plus"></i>

            Novo Atendimento

        </button>

    </div>

    <div class="painel">

        <table class="tabela-dashboard">

            <thead>

                <tr>

                    <th>Nº</th>

                    <th>Data</th>

                    <th>Criança</th>

                    <th>Responsável</th>

                    <th>Status</th>

                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="listaAtendimentos">

                <tr>

                    <td colspan="6">

                        Nenhum atendimento cadastrado.

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</section>

<!-- ================= MODAL ================= -->

<div class="modal" id="modalAtendimento">

<div class="modal-box">

<div class="modal-header">

<h2>Novo Atendimento</h2>

<button class="fechar" id="fecharModal">

×

</button>

</div>

<div class="modal-body">

<form id="formAtendimento">

<div class="form-grid">

<div class="form-group">

<label>Data</label>

<input type="date" id="data">

</div>

<div class="form-group">

<label>Hora</label>

<input type="time" id="hora">

</div>

<div class="form-group">

<label>Criança / Adolescente</label>

<input type="text" id="crianca">

</div>

<div class="form-group">

<label>Responsável</label>

<input type="text" id="responsavel">

</div>

<div class="form-group">

<label>Telefone</label>

<input type="text" id="telefone">

</div>

<div class="form-group">

<label>Status</label>

<select id="status">

<option>Em Atendimento</option>

<option>Concluído</option>

<option>Encaminhado</option>

<option>Pendente</option>

</select>

</div>

<div class="form-group full">

<label>Relato</label>

<textarea id="relato"></textarea>

</div>

</div>

</form>

</div>

<div class="modal-footer">

<button class="btn-cancelar" id="cancelar">

Cancelar

</button>

<button class="btn-salvar">

Salvar Atendimento

</button>

</div>

</div>

</div>

<!-- ==========================================================
    PATRIMÔNIO - SIGACTPAR
=========================================================== -->
<div class="pagina">

    <!-- CABEÇALHO -->
    <div class="titulo-pagina">
        <div>
            <h2><i class="fa-solid fa-boxes-stacked"></i> Patrimônio</h2>
            <p>Controle de bens e equipamentos do Conselho Tutelar.</p>
        </div>
        <div class="acoes-topo">
            <button class="btn-secundario" id="btnAtualizarPatrimonio">
                <i class="fa-solid fa-rotate"></i> Atualizar
            </button>
            <button class="btn-padrao" id="btnNovoPatrimonio">
                <i class="fa-solid fa-plus"></i> Novo Item
            </button>
        </div>
    </div>

    <!-- PESQUISA -->
    <div class="painel">
        <div class="grupo-campo" style="margin-bottom: 0;">
            <label for="pesquisaPatrimonio">Pesquisar Bem Patrimonial</label>
            <input type="text" id="pesquisaPatrimonio" placeholder="Pesquisar por descrição, tombamento ou local...">
        </div>
    </div>

    <!-- TABELA -->
    <div class="painel">
        <div class="tabela-container">
            <table class="tabela-dashboard">
                <thead>
                    <tr>
                        <th>Nº Tombamento</th>
                        <th>Descrição do Bem</th>
                        <th>Localização</th>
                        <th>Estado</th>
                        <th width="150">Ações</th>
                    </tr>
                </thead>
                <tbody id="listaPatrimonio">
                    <tr><td colspan="5" style="text-align: center;">Nenhum patrimônio cadastrado.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- ==========================================================
    MODAL CADASTRO / EDIÇÃO DE PATRIMÔNIO
=========================================================== -->
<div class="modal" id="modalPatrimonio">
    <div class="modal-box modal-grande">
        <div class="modal-header">
            <h2><i class="fa-solid fa-box"></i> Cadastro de Patrimônio</h2>
            <button class="fechar" id="fecharModalPatrimonio" type="button"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="formPatrimonio">
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Número de Tombamento <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="tombamentoPatrimonio" required placeholder="Ex: 001234">
                    </div>
                    <div class="form-group">
                        <label>Estado de Conservação</label>
                        <select id="estadoPatrimonio">
                            <option>Bom</option>
                            <option>Regular</option>
                            <option>Danificado</option>
                            <option>Em Manutenção</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Descrição Extensa do Bem <span style="color:var(--vermelho);">*</span></label>
                        <textarea id="descricaoPatrimonio" rows="4" required placeholder="Detalhes completos, marca, modelo, série..."></textarea>
                    </div>
                    <div class="form-group full">
                        <label>Localização / Sala <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="localPatrimonio" required placeholder="Ex: Sala da Secretaria / Sala de Reuniões">
                    </div>
                    <div class="form-group full">
                        <label>Observações</label>
                        <textarea id="obsPatrimonio" rows="3" placeholder="Informações adicionais..."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secundario" id="cancelarPatrimonio">Cancelar</button>
                <button type="submit" class="btn-padrao"><i class="fa-solid fa-floppy-disk"></i> Salvar Item</button>
            </div>
        </form>
    </div>
</div>

<!-- ==========================================================
    MODAL VISUALIZAR E IMPRIMIR
=========================================================== -->
<div class="modal" id="modalVisualizarPatrimonio">
    <div class="modal-box modal-grande">
        <div class="modal-header">
            <h2><i class="fa-solid fa-eye"></i> Detalhes do Patrimônio</h2>
            <button class="fechar" id="fecharVisualizarPatrimonio" type="button"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nº Tombamento</label>
                    <input type="text" id="verTombamento" readonly>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="verEstado" readonly>
                </div>
                <div class="form-group full">
                    <label>Descrição Completa</label>
                    <textarea id="verDescricao" rows="4" readonly></textarea>
                </div>
                <div class="form-group full">
                    <label>Localização</label>
                    <input type="text" id="verLocal" readonly>
                </div>
                <div class="form-group full">
                    <label>Observações</label>
                    <textarea id="verObs" rows="3" readonly></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-secundario" id="fecharVisualizarPatrimonioRodape" type="button">Fechar</button>
            <button class="btn-padrao" type="button" onclick="window.print()"><i class="fa-solid fa-print"></i> Imprimir</button>
        </div>
    </div>
</div>

<!-- ==========================================================
    RESPONSÁVEIS - SIGACTPAR
=========================================================== -->

<div class="pagina">

    <!-- CABEÇALHO DA PÁGINA & AÇÕES -->
    <div class="titulo-pagina">
        <div>
            <h2>Responsáveis Legais</h2>
            <small>Cadastro e consulta de pais, tutores e responsáveis legais.</small>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button id="btnAtualizarResponsaveis" class="btn-padrao" style="background: var(--cor-fundo); color: var(--texto); border: 1px solid var(--borda);">
                <i class="fa-solid fa-rotate"></i> Atualizar
            </button>
            <button id="btnNovoResponsavel" class="btn-padrao">
                <i class="fa-solid fa-plus"></i> Novo Responsável
            </button>
        </div>
    </div>

    <!-- CARDS / INDICADORES -->
    <div class="dashboard-cards">
        <div class="card azul">
            <div class="card-icone"><i class="fa-solid fa-users"></i></div>
            <div class="card-info">
                <span>Total de Responsáveis</span>
                <h3 id="cardTotalResponsaveis">0</h3>
                <small>Cadastrados no sistema</small>
            </div>
        </div>
    </div>

    <!-- PAINEL DE PESQUISA -->
    <div class="painel">
        <div class="grupo-campo" style="margin-bottom: 0;">
            <label for="pesquisaResponsavel">Pesquisar Responsável</label>
            <input type="text" id="pesquisaResponsavel" placeholder="Digite o nome, CPF ou telefone...">
        </div>
    </div>

    <!-- TABELA DE REGISTROS -->
    <div class="painel">
        <div class="painel-header" style="margin-bottom: 15px;">
            <h3><i class="fa-solid fa-list"></i> Lista de Responsáveis</h3>
        </div>

        <div class="tabela-container">
            <table class="tabela-dashboard">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome Completo</th>
                        <th>CPF</th>
                        <th>Telefone / Contato</th>
                        <th>Endereço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaResponsaveis">
                    <!-- Preenchido via responsaveis.js -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- ==========================================================
    MODAL DE CADASTRO / EDIÇÃO DE RESPONSÁVEL
=========================================================== -->
<div id="modalResponsavel" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Formulário de Responsável Legal</h2>
            <button id="fecharModalResponsavel" class="fechar"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <form id="formResponsavel">
            <div class="modal-body">
                <div class="form-grid">
                    
                    <div class="form-group full">
                        <label for="nomeResponsavel">Nome Completo <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="nomeResponsavel" placeholder="Nome completo do responsável" required>
                    </div>

                    <div class="form-group">
                        <label for="cpfResponsavel">CPF <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="cpfResponsavel" placeholder="000.000.000-00" required>
                    </div>

                    <div class="form-group">
                        <label for="telefoneResponsavel">Telefone / WhatsApp <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="telefoneResponsavel" placeholder="(61) 90000-0000" required>
                    </div>

                    <div class="form-group full">
                        <label for="enderecoResponsavel">Endereço Residencial <span style="color:var(--vermelho);">*</span></label>
                        <input type="text" id="enderecoResponsavel" placeholder="Quadra, conjunto, número, bairro..." required>
                    </div>

                    <div class="form-group full">
                        <label for="observacoesResponsavel">Observações</label>
                        <textarea id="observacoesResponsavel" placeholder="Informações adicionais relevantes..."></textarea>
                    </div>

                </div>
            </div>

            <div class="modal-footer">
                <button type="button" id="cancelarResponsavel" class="btn-cancelar">Cancelar</button>
                <button type="submit" class="btn-salvar"><i class="fa-solid fa-floppy-disk"></i> Salvar Registro</button>
            </div>
        </form>
    </div>
</div>

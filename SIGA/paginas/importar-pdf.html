<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIGA - Importar PDF</title>

<link rel="stylesheet" href="../css/style.css">

</head>


<body>


<div class="layout">


<!-- MENU LATERAL -->

<aside class="sidebar">


<div class="logo">

<h2>SIGA</h2>

<span>Gestão de Atendimentos</span>

</div>


<nav>

<a href="../index.html">
Dashboard
</a>


<a href="cadastro.html">
Cadastro
</a>


<a href="pesquisa.html">
Pesquisa
</a>


<a class="ativo">
Importar PDF
</a>


<a href="relatorios.html">
Relatórios
</a>


<a href="usuarios.html">
Usuários
</a>


</nav>


</aside>



<!-- CONTEÚDO -->


<main class="conteudo">


<header>

<div>

<h1>
Importação de Documento PDF
</h1>

<p>
Leitura automática de atendimentos
</p>

</div>


</header>




<section class="painel">


<h3>
Selecionar documento
</h3>


<div class="form-group">


<label>
Arquivo PDF
</label>


<input 
type="file"
id="arquivoPDF"
accept="application/pdf">



</div>


<br>


<button 
class="btn"
onclick="lerPDF()">

Ler Documento

</button>


</section>





<section class="painel">


<h3>
Informações encontradas
</h3>



<div class="form-grid">



<div class="form-group">

<label>
Nome
</label>

<input id="pdfNome">

</div>



<div class="form-group">

<label>
Data de Nascimento
</label>

<input id="pdfNascimento">

</div>




<div class="form-group">

<label>
Responsável
</label>

<input id="pdfResponsavel">

</div>




<div class="form-group">

<label>
Telefone
</label>

<input id="pdfTelefone">

</div>





<div class="form-group">

<label>
Endereço
</label>

<input id="pdfEndereco">

</div>




<div class="form-group">

<label>
Localidade
</label>

<input id="pdfLocalidade">

</div>





<div class="form-group">

<label>
Tipo de Atendimento
</label>


<input id="pdfTipo">


</div>




<div class="form-group">

<label>
Assunto
</label>


<input id="pdfAssunto">


</div>



</div>



<br>


<div class="form-group">


<label>
Texto extraído do PDF
</label>


<textarea 
id="textoPDF"
rows="8">
</textarea>


</div>



<br>


<button 
class="btn"
onclick="enviarCadastro()">

Enviar para Cadastro

</button>



</section>



</main>



</div>




<script src="../js/pdf.js"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>SIGA - Importar PDF</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>



<div class="layout">


<!-- MENU -->

<aside class="sidebar">


<div class="logo">

<h2>SIGA</h2>

<span>
Gestão de Atendimentos
</span>

</div>




<nav>


<a href="index.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>



<a href="cadastro.html">

<i class="fa-solid fa-file-circle-plus"></i>

Cadastro

</a>




<a href="pesquisa.html">

<i class="fa-solid fa-magnifying-glass"></i>

Pesquisa

</a>




<a class="ativo">

<i class="fa-solid fa-file-pdf"></i>

Importar PDF

</a>



<a>

<i class="fa-solid fa-chart-column"></i>

Relatórios

</a>



<a>

<i class="fa-solid fa-gear"></i>

Configurações

</a>



</nav>



<div class="usuario">

<i class="fa-solid fa-circle-user"></i>

Administrador

</div>



</aside>







<!-- CONTEÚDO -->


<main class="conteudo">



<header>


<div>

<h1>
Importação de PDF
</h1>


<p>
Leitura automática de documentos
</p>


</div>


</header>






<section class="painel">


<h3>

<i class="fa-solid fa-file-pdf"></i>

Selecionar Documento

</h3>



<div class="form-group">


<label>
Arquivo PDF
</label>


<input 
type="file"
id="arquivoPDF"
accept="application/pdf">



</div>



<br>



<button onclick="lerPDF()">



<i class="fa-solid fa-magnifying-glass"></i>


Ler Documento



</button>



</section>








<section class="painel">


<h3>

<i class="fa-solid fa-file-lines"></i>

Texto encontrado

</h3>



<textarea 

id="textoPDF"

rows="15"

placeholder="O texto do documento aparecerá aqui...">

</textarea>



</section>







<section class="painel">


<h3>

<i class="fa-solid fa-database"></i>

Dados identificados

</h3>




<div class="form-grid">



<div class="form-group">

<label>
Nome
</label>

<input id="pdfNome">


</div>





<div class="form-group">

<label>
Data de nascimento
</label>

<input id="pdfNascimento">


</div>





<div class="form-group">

<label>
Responsável
</label>

<input id="pdfResponsavel">


</div>





<div class="form-group">

<label>
Telefone
</label>

<input id="pdfTelefone">


</div>





<div class="form-group">

<label>
Endereço
</label>

<input id="pdfEndereco">


</div>





<div class="form-group">

<label>
Localidade
</label>

<input id="pdfLocalidade">


</div>





<div class="form-group">

<label>
Tipo de atendimento
</label>

<input id="pdfTipo">


</div>





<div class="form-group">

<label>
Assunto
</label>

<input id="pdfAssunto">


</div>



</div>





<br>


<button onclick="enviarCadastro()">



<i class="fa-solid fa-arrow-right"></i>


Enviar para Cadastro



</button>



</section>







</main>


</div>







<!-- Biblioteca PDF -->


<script src="
https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
</script>



<script src="js/pdf.js"></script>



</body>

</html>

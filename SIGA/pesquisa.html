<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>SIGA - Pesquisa</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>


<div class="layout">



<!-- MENU LATERAL -->

<aside class="sidebar">


<div class="logo">

<h2>SIGA</h2>

<span>
Gestão de Atendimentos
</span>

</div>



<nav>


<a href="index.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>



<a href="cadastro.html">

<i class="fa-solid fa-file-circle-plus"></i>

Cadastro

</a>




<a class="ativo">

<i class="fa-solid fa-magnifying-glass"></i>

Pesquisa

</a>




<a>

<i class="fa-solid fa-chart-column"></i>

Relatórios

</a>




<a>

<i class="fa-solid fa-gear"></i>

Configurações

</a>



</nav>



<div class="usuario">

<i class="fa-solid fa-circle-user"></i>

Administrador

</div>



</aside>





<!-- CONTEÚDO -->


<main class="conteudo">



<header>


<div>

<h1>
Pesquisa de Atendimentos
</h1>


<p>
Consulta de registros cadastrados
</p>

</div>



</header>







<!-- FILTROS -->


<section class="painel">


<h3>

<i class="fa-solid fa-filter"></i>

Filtros de Pesquisa

</h3>




<div class="barra-pesquisa">



<div class="form-group">

<label>
Nome da Criança/Adolescente
</label>


<input 
type="text"
id="filtroNome"
placeholder="Digite o nome">


</div>






<div class="form-group">

<label>
Responsável
</label>


<input 
type="text"
id="filtroResponsavel"
placeholder="Digite o responsável">


</div>






<div class="form-group">

<label>
Localidade
</label>


<input 
type="text"
id="filtroLocalidade">


</div>







<div class="form-group">

<label>
Assunto
</label>


<select id="filtroAssunto">


<option value="">
Todos
</option>


<option>
Vaga Escolar
</option>


<option>
Abandono de Incapaz
</option>


<option>
Conflito Familiar
</option>


<option>
Outro
</option>


</select>


</div>






<div class="form-group">

<label>
Tipo de Atendimento
</label>


<select id="filtroTipo">


<option value="">
Todos
</option>


<option>
Atendimento Presencial
</option>


<option>
Atendimento Telefônico
</option>


<option>
Atendimento On-line
</option>


<option>
Outro
</option>


</select>


</div>



</div>




<button onclick="pesquisarAtendimentos()">


<i class="fa-solid fa-magnifying-glass"></i>

Pesquisar


</button>



</section>









<!-- RESULTADOS -->


<section class="painel">


<h3>

<i class="fa-solid fa-list"></i>

Resultados

</h3>




<div class="tabela-container">


<table>


<thead>


<tr>


<th>
Data
</th>


<th>
Nome
</th>


<th>
Responsável
</th>


<th>
Assunto
</th>


<th>
Tipo
</th>


<th>
Plantonista
</th>


<th>
Ações
</th>



</tr>


</thead>




<tbody id="resultadoPesquisa">


<tr>

<td colspan="7" style="text-align:center">

Utilize os filtros para pesquisar

</td>

</tr>


</tbody>



</table>


</div>


</section>





</main>


</div>






<script src="js/pesquisa.js"></script>


</body>


</html>

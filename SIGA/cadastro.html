<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>SIGA - Cadastro</title>


<link rel="stylesheet" href="css/style.css">


<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>



<div class="layout">



<!-- MENU -->

<aside class="sidebar">


<div class="logo">

<h2>SIGA</h2>

<span>
Gestão de Atendimentos
</span>

</div>



<nav>


<a href="index.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>



<a class="ativo">

<i class="fa-solid fa-file-circle-plus"></i>

Cadastro

</a>




<a href="pesquisa.html">

<i class="fa-solid fa-magnifying-glass"></i>

Pesquisa

</a>




<a>

<i class="fa-solid fa-chart-column"></i>

Relatórios

</a>




<a>

<i class="fa-solid fa-gear"></i>

Configurações

</a>


</nav>




<div class="usuario">

<i class="fa-solid fa-circle-user"></i>

Administrador

</div>



</aside>






<!-- CONTEÚDO -->


<main class="conteudo">



<header>


<div>

<h1>
Novo Atendimento
</h1>


<p>
Cadastro de criança/adolescente
</p>

</div>


</header>







<form id="formAtendimento">






<!-- ======================
CRIANÇA
======================= -->


<section class="painel">


<h3>

<i class="fa-solid fa-child"></i>

Criança / Adolescente

</h3>



<div class="form-grid">



<div class="form-group">

<label>
Nome
</label>

<input 
type="text"
id="nome"
placeholder="Nome completo">

</div>





<div class="form-group">

<label>
Data de nascimento
</label>

<input 
type="date"
id="dataNascimento">

</div>





<div class="form-group">

<label>
Sexo
</label>


<select id="sexo">

<option>
Selecione
</option>

<option>
Masculino
</option>

<option>
Feminino
</option>

</select>


</div>





<div class="form-group">

<label>
CPF
</label>

<input 
type="text"
id="cpf">

</div>





<div class="form-group">

<label>
RG
</label>

<input 
type="text"
id="rg">

</div>



</div>


</section>








<!-- ======================
RESPONSÁVEL
======================= -->


<section class="painel">


<h3>

<i class="fa-solid fa-users"></i>

Responsável / Genitor

</h3>



<div class="form-grid">



<div class="form-group">

<label>
Nome do responsável
</label>

<input 
type="text"
id="responsavel">

</div>





<div class="form-group">

<label>
Parentesco
</label>

<input 
type="text"
id="parentesco">

</div>





<div class="form-group">

<label>
Telefone
</label>

<input 
type="text"
id="telefone">

</div>





<div class="form-group">

<label>
Telefone 2
</label>

<input 
type="text"
id="telefone2">

</div>



</div>


</section>








<!-- ======================
ENDEREÇO
======================= -->


<section class="painel">


<h3>

<i class="fa-solid fa-location-dot"></i>

Endereço

</h3>



<div class="form-grid">



<div class="form-group">

<label>
Endereço
</label>

<input 
type="text"
id="endereco">

</div>





<div class="form-group">

<label>
Número
</label>

<input 
type="text"
id="numero">

</div>





<div class="form-group">

<label>
Bairro
</label>

<input 
type="text"
id="bairro">

</div>





<div class="form-group">

<label>
Localidade
</label>

<input 
type="text"
id="localidade">

</div>



</div>


</section>









<!-- ======================
ATENDIMENTO
======================= -->


<section class="painel">


<h3>

<i class="fa-solid fa-clipboard"></i>

Dados do Atendimento

</h3>



<div class="form-grid">





<div class="form-group">

<label>
Data
</label>

<input 
type="date"
id="data">

</div>





<div class="form-group">

<label>
Hora
</label>

<input 
type="time"
id="hora">

</div>





<div class="form-group">

<label>
Tipo de Atendimento
</label>


<select id="tipo">


<option>
Atendimento Presencial
</option>


<option>
Atendimento Telefônico
</option>


<option>
Atendimento On-line
</option>


<option>
Outro
</option>


</select>


</div>






<div class="form-group">

<label>
Assunto
</label>


<select id="assunto">


<option>
Vaga Escolar
</option>


<option>
Abandono de Incapaz
</option>


<option>
Conflito Familiar
</option>


<option>
Outro
</option>


</select>


</div>







<div class="form-group">

<label>
Plantonista
</label>

<input 
type="text"
id="plantonista">

</div>



</div>






<div class="form-group">


<label>
Observações
</label>


<textarea id="observacoes"></textarea>


</div>




<br>


<button type="button" onclick="salvarAtendimento()">


<i class="fa-solid fa-save"></i>

Salvar Atendimento


</button>



</section>






</form>





</main>


</div>






<script src="js/cadastro.js"></script>


</body>

</html>

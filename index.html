<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGACTPAR - Sistema de Gestão do Conselho Tutelar</title>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos do Sistema -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ==========================================================
        TELA DE CARREGAMENTO (SPINNER)
    =========================================================== -->
    <div id="loading" class="loading-overlay oculto">
        <div class="spinner"></div>
    </div>

    <!-- ==========================================================
        ESTRUTURA PRINCIPAL (LAYOUT)
    =========================================================== -->
    <div class="app-container">

        <!-- ==========================================================
            BARRA LATERAL / MENU (SIDEBAR)
        =========================================================== -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-shield-child"></i> <span>SIGACTPAR</span></h2>
                <small>Conselho Tutelar</small>
            </div>

            <div class="sidebar-user">
                <div class="user-avatar"><i class="fa-solid fa-user-tie"></i></div>
                <div class="user-info">
                    <span id="nomeUsuarioLogado">Conselheiro(a)</span>
                    <small id="dataAtual">Carregando...</small>
                </div>
            </div>

            <nav class="menu">
                <ul>
                    <li class="ativo">
                        <a href="#" data-page="dashboard">
                            <i class="fa-solid fa-chart-pie"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="atendimentos">
                            <i class="fa-solid fa-clipboard-user"></i>
                            <span>Atendimentos</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="criancas">
                            <i class="fa-solid fa-child"></i>
                            <span>Crianças / Adolescentes</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="responsaveis">
                            <i class="fa-solid fa-people-group"></i>
                            <span>Responsáveis</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="processos">
                            <i class="fa-solid fa-folder-open"></i>
                            <span>Processos</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="agenda">
                            <i class="fa-solid fa-calendar-days"></i>
                            <span>Agenda</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="relatorios">
                            <i class="fa-solid fa-file-lines"></i>
                            <span>Relatórios</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="veiculos">
                            <i class="fa-solid fa-car"></i>
                            <span>Veículos</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="patrimonio">
                            <i class="fa-solid fa-boxes-stacked"></i>
                            <span>Patrimônio</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button id="btnSairSistema" class="btn-sair" title="Sair do Sistema">
                    <i class="fa-solid fa-right-from-bracket"></i> <span>Sair do Sistema</span>
                </button>
            </div>
        </aside>

        <!-- ==========================================================
            CONTEÚDO PRINCIPAL
        =========================================================== -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="btnMenu" class="btn-menu-mobile" title="Abrir menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h1 id="tituloPagina">Dashboard</h1>
                </div>

                <div class="topbar-actions">
                    <span class="badge-versao">v1.0 A1</span>
                </div>
            </header>

            <!-- Área dinâmica onde as páginas (HTML) são injetadas -->
            <div id="conteudo" class="conteudo-dinamico">
                <!-- O conteúdo da página ativa carrega aqui via JS -->
            </div>
        </main>

    </div>

    <!-- ==========================================================
        SCRIPTS DO SISTEMA (ORDEM DE DEPENDÊNCIA)
    =========================================================== -->
    <!-- Banco de dados local / Mock -->
    <script defer src="js/banco.js"></script>

    <!-- Controladores dos módulos -->
    <script defer src="js/dashboard.js"></script>
    <script defer src="js/atendimentos.js"></script>
    <script defer src="js/criancas.js"></script>
    <script defer src="js/responsaveis.js"></script>
    <script defer src="js/processos.js"></script>
    <script defer src="js/agenda.js"></script>

    <!-- Roteador e Menu (deve vir por último para carregar as páginas) -->
    <script defer src="js/menu.js"></script>
    <script defer src="js/app.js"></script>

</body>
</html>

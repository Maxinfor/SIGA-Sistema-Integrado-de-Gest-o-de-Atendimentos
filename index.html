<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGACTPAR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-scale-balanced"></i>
                <div class="logo-texto">
                    <h2>SIGACTPAR</h2>
                    <span>Conselho Tutelar do Paranoá</span>
                </div>
            </div>
            <nav class="menu">
                <ul>
                    <li class="ativo"><a href="#"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                    <li><a href="#"><i class="fa-solid fa-file-lines"></i> <span>Atendimentos</span></a></li>
                </ul>
            </nav>
            <div class="perfil-sidebar">
                <div class="perfil-info">
                    <strong>Administrador</strong>
                    <small id="dataAtual"></small>
                </div>
            </div>
        </aside>

        <main class="principal">
            <header class="header-principal">
                <h2>Dashboard</h2>
                <div class="header-acoes">
                    <div class="busca"><i class="fa-solid fa-magnifying-glass"></i> <input type="text" placeholder="Buscar..."></div>
                </div>
            </header>

            <div class="dashboard-cards">
                <div class="card"><h3>Atendimentos</h3><p class="numero">12</p></div>
                <div class="card"><h3>Casos</h3><p class="numero">45</p></div>
                <div class="card"><h3>Processos</h3><p class="numero">108</p></div>
                <div class="card"><h3>Urgências</h3><p class="numero">3</p></div>
            </div>

            <div class="container-tabela">
                <h3>Atendimentos Recentes</h3>
                <table>
                    <thead><tr><th>ID</th><th>Data</th><th>Responsável</th><th>Status</th></tr></thead>
                    <tbody>
                        <tr><td>#001</td><td>17/07/2026</td><td>João</td><td>Em análise</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGACTPAR - Conselho Tutelar</title>
    <!-- Inclua aqui os links para seus CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tabelas.css">
    <!-- Ícones (Exemplo com FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i>
            <div class="logo-texto">
                <h2>SIGACTPAR</h2>
                <span>Conselho Tutelar</span>
            </div>
        </div>
        <nav class="menu">
            <ul>
                <li class="ativo"><a href="#"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a></li>
                <li><a href="#"><i class="fa-solid fa-file-lines"></i> <span>Atendimentos</span></a></li>
            </ul>
        </nav>
        <div class="perfil-sidebar">
            <p>Administrador</p>
            <span id="dataAtual"></span>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="principal">
        <header class="header-principal">
            <button id="btnMenuMobile" class="btn-menu-mobile">
                <i class="fa-solid fa-bars"></i>
            </button>
            <h2 id="tituloPagina">Dashboard</h2>
            <div class="busca">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar atendimentos...">
            </div>
        </header>

        <!-- Cards de Resumo -->
        <section class="dashboard-cards">
            <div class="card"><h3>Atendimentos</h3><p class="numero">0</p></div>
            <div class="card"><h3>Casos</h3><p class="numero">0</p></div>
            <div class="card"><h3>Processos</h3><p class="numero">0</p></div>
            <div class="card"><h3>Urgências</h3><p class="numero">0</p></div>
        </section>

        <!-- Tabela -->
        <section class="container-tabela">
            <button class="btn-acao" onclick="document.getElementById('modalCadastro').style.display='block'">
                <i class="fa-solid fa-plus"></i> Novo Atendimento
            </button>
            <br><br>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Responsável</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>

    <!-- Modais -->
    <div id="modalDetalhes" class="modal">
        <div class="modal-conteudo">
            <span class="fechar-modal" onclick="document.getElementById('modalDetalhes').style.display='none'">&times;</span>
            <h2>Detalhes do Atendimento</h2>
            <div id="infoDetalhes"></div>
        </div>
    </div>

    <div id="modalCadastro" class="modal">
        <div class="modal-conteudo">
            <span class="fechar-modal" onclick="document.getElementById('modalCadastro').style.display='none'">&times;</span>
            <h2>Novo Atendimento</h2>
            <form id="formAtendimento">
                <input type="text" id="responsavel" placeholder="Nome do Responsável" required>
                <input type="text" id="status" placeholder="Status" required>
                <div id="mensagemErro" style="color: red; font-size: 0.8rem; margin-bottom: 10px; display: none;">Preencha todos os campos!</div>
                <button type="submit" class="btn-acao">Salvar Atendimento</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/banco.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SIGACTPAR - Sistema Integrado de Gestão de Atendimentos do Conselho Tutelar do Paranoá">
    <title>SIGACTPAR</title>

    <!-- ÍCONES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
    <div class="container">
        
        <!-- MENU LATERAL -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fa-solid fa-scale-balanced"></i>
                <div class="logo-texto">
                    <h2>SIGACTPAR</h2>
                    <span>Conselho Tutelar do Paranoá</span>
                </div>
            </div>

            <nav class="menu">
                <ul>
                    <li class="ativo"><a href="#" data-page="dashboard"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a></li>
                    <li><a href="#" data-page="atendimentos"><i class="fa-solid fa-file-lines"></i> <span>Atendimentos</span></a></li>
                </ul>
            </nav>

            <div class="perfil-sidebar">
                <div class="perfil-info">
                    <strong>Administrador</strong>
                    <small id="dataAtual"></small>
                </div>
            </div>
        </aside>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="principal" id="principal">

            <header class="header-principal">
                <div class="header-titulo">
                    <h2 id="tituloPagina">Dashboard</h2>
                </div>
                <div class="header-acoes">
                    <div class="busca">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Buscar atendimentos...">
                    </div>
                </div>
            </header>

            <!-- DASHBOARD CARDS -->
            <div class="dashboard-cards">
                <div class="card"><h3>Atendimentos</h3><p class="numero">12</p></div>
                <div class="card"><h3>Casos</h3><p class="numero">45</p></div>
                <div class="card"><h3>Processos</h3><p class="numero">108</p></div>
                <div class="card"><h3>Urgências</h3><p class="numero">3</p></div>
            </div>

            <!-- TABELA DE ATENDIMENTOS -->
            <div class="container-tabela">
                <div class="header-tabela">
                    <h3>Atendimentos Recentes</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Data</th>
                            <th>Responsável</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Preenchido via JavaScript -->
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <!-- JAVASCRIPT -->
    <script src="js/banco.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
    <!-- Modal de Detalhes -->
<div id="modalDetalhes" class="modal">
    <div class="modal-conteudo">
        <span class="fechar-modal">&times;</span>
        <h2>Detalhes do Atendimento</h2>
        <div id="infoDetalhes">
            <!-- Dados carregados via JS -->
        </div>
    </div>
</div>
</body>
</html>
